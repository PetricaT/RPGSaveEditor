name: Build & Release

on:
  push:
    tags: ["v*.*.0"]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and build tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qt6-base-dev libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PWD/staging

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Install
        run: cmake --install build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGSaveEditor-linux
          path: staging/

      - name: Set installer version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/__VERSION__/$VERSION/" installer/config/config-linux.xml installer/packages/com.petricat.rpgsaveeditor/meta/package.xml

      - name: Install Qt Installer Framework
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: 'linux'
          target: 'desktop'
          tools: 'tools_ifw'
          tools-only: 'true'

      - name: Prepare installer payload
        run: |
          mkdir -p installer/packages/com.petricat.rpgsaveeditor/data
          cp staging/bin/RPGSaveEditor installer/packages/com.petricat.rpgsaveeditor/data/
          cp assets/icon.png installer/packages/com.petricat.rpgsaveeditor/data/

      - name: Build Linux installer
        run: |
          binarycreator --offline-only \
            -c installer/config/config-linux.xml \
            -p installer/packages \
            RPGSaveEditor-Linux-Installer.run
          chmod +x RPGSaveEditor-Linux-Installer.run

      - name: Upload Linux installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGSaveEditor-linux-installer
          path: RPGSaveEditor-Linux-Installer.run

  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and build tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qt6-base-dev libgl1-mesa-dev fuse libfuse2 file

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PWD/AppDir/usr

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Install
        run: cmake --install build

      - name: Copy desktop & icon for AppImage
        run: |
          cp assets/RPGSaveEditor.desktop AppDir/
          cp assets/icon.png AppDir/
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/RPGSaveEditor.png

      - name: Download linuxdeploy and linuxdeploy-plugin-qt
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        run: |
          export LDAI_OUTPUT=RPGSaveEditor-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGSaveEditor-x86_64.AppImage
          path: RPGSaveEditor-x86_64.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + Qt Installer Framework
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7'
          arch: 'win64_msvc2019_64'
          modules: 'qtimageformats'
          tools: 'tools_ifw'
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        run: windeployqt.exe --release --no-translations build\Release\RPGSaveEditor.exe

      - name: Package portable zip
        run: Compress-Archive -Path build\Release\* -DestinationPath RPGSaveEditor-windows-portable.zip

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGSaveEditor-windows-portable
          path: RPGSaveEditor-windows-portable.zip

      - name: Set installer version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/__VERSION__/$VERSION/" installer/config/config-windows.xml installer/packages/com.petricat.rpgsaveeditor/meta/package.xml

      - name: Prepare installer payload
        shell: bash
        run: |
          mkdir -p installer/packages/com.petricat.rpgsaveeditor/data
          cp -r build/Release/* installer/packages/com.petricat.rpgsaveeditor/data/

      - name: Build Windows installer
        run: binarycreator.exe --offline-only -c installer\config\config-windows.xml -p installer\packages RPGSaveEditor-Windows-Installer.exe

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGSaveEditor-windows-installer
          path: RPGSaveEditor-Windows-Installer.exe

  release:
    needs: [linux, appimage, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package linux release
        run: |
          cd artifacts/RPGSaveEditor-linux
          tar -czf ../../RPGSaveEditor-linux.tar.gz .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/RPGSaveEditor-x86_64.AppImage/RPGSaveEditor-x86_64.AppImage
            RPGSaveEditor-linux.tar.gz
            artifacts/RPGSaveEditor-linux-installer/RPGSaveEditor-Linux-Installer.run
            artifacts/RPGSaveEditor-windows-portable/RPGSaveEditor-windows-portable.zip
            artifacts/RPGSaveEditor-windows-installer/RPGSaveEditor-Windows-Installer.exe
