name: Build & Release

on:
  push:
    tags: ["v*.*.0"]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and build tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qt6-base-dev libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PWD/staging

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Install
        run: cmake --install build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGSaveEditor-linux
          path: staging/

  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and build tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qt6-base-dev libgl1-mesa-dev fuse libfuse2 file

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PWD/AppDir/usr

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Install
        run: cmake --install build

      - name: Copy desktop & icon for AppImage
        run: |
          cp assets/RPGSaveEditor.desktop AppDir/
          cp assets/icon.png AppDir/
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/RPGSaveEditor.png

      - name: Download linuxdeploy and linuxdeploy-plugin-qt
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        run: |
          export LDAI_OUTPUT=RPGSaveEditor-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGSaveEditor-x86_64.AppImage
          path: RPGSaveEditor-x86_64.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
    
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7"
          arch: "win64_msvc2019_64"
          modules: "qtimageformats"
          cache: true
        
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        
      - name: Build
        run: cmake --build build --config Release
        
      - name: Deploy Qt dependencies
        run: windeployqt.exe --release --no-translations build\Release\RPGSaveEditor.exe
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGSaveEditor-windows
          path: build/Release/ # whole folder now, not just the exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7"
          arch: "clang_64"
          modules: "qtimageformats"
          cache: true

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_INSTALL_PREFIX=$PWD/staging

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.ncpu)

      - name: Install
        run: cmake --install build

      - name: Deploy Qt into .app bundle
        run: macdeployqt staging/bin/RPGSaveEditor.app -no-translations

      - name: Create DMG
        run: |
          mkdir -p dmg-stuff
          cp -R staging/bin/RPGSaveEditor.app dmg-stuff/
          ln -s /Applications dmg-stuff/Applications
          hdiutil create -volname "RPGSaveEditor" \
            -srcfolder dmg-stuff -ov -format UDZO \
            RPGSaveEditor.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGSaveEditor-macos
          path: RPGSaveEditor.dmg

  release:
    needs: [linux, appimage, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package linux release
        run: |
          cd artifacts/RPGSaveEditor-linux
          tar -czf ../../RPGSaveEditor-linux.tar.gz .

      - name: Package windows release
        run: |
          cd artifacts/RPGSaveEditor-windows
          zip -r ../../RPGSaveEditor-windows.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/RPGSaveEditor-x86_64.AppImage/RPGSaveEditor-x86_64.AppImage
            RPGSaveEditor-linux.tar.gz
            RPGSaveEditor-windows.zip
            artifacts/RPGSaveEditor-macos/RPGSaveEditor.dmg
